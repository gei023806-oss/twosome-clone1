<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twosome Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        .a{display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.96);
            padding: 0 16px;
            height: 48px;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 540px;
            height: 7%;
            border: none;
            z-index: 200;}

        .n{font-weight: 800;
            padding-right: 240px;
             font-size: 18px;
            padding-bottom: 8px;}
        
             .nn{padding-left:15px;
            padding-bottom: 8px;}
             .nnn{padding-right: 110px;
            padding-bottom: 8px;}


        .y {
    display: flex;
    align-items: center;
    padding-top: 100px;
    justify-content: center;
    padding-right: 30px;
    
    /* 여기서부터 추가 및 변경된 부분 */
    font-family: 'Montserrat', sans-serif; /* 몬세라트 폰트 적용 */
    font-size: 15px; /* 크기를 살짝 키움 */
    font-weight: 200; /* 아주 두껍게 */
    letter-spacing: 1.5px; /* 자간을 넓혀 로고 느낌 강조 */
    color: #222;
}
             


  .input-section {
        padding-top: 50px;
        display: flex;
        flex-direction: column;
        
    }

    .input-wrapper {
    display: flex;
    align-items: center;
    border-bottom: 1px solid #ccc;
    padding-top: 40px;
    padding-bottom: 13px;
     transition: border-bottom-color 0.3s, transform 0.3s;
    position: relative;
}

    .input-wrapper input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    background: transparent;
    color: #333;
    transition: transform 0.3s;
}

    .input-wrapper input::placeholder {font-size: 16px; font-weight: 500;
        color: #8a8989;
    }


    .input-wrapper.eye-active input {
    transform: translateY(-2px);
}

   .input-wrapper.eye-active {
    border-bottom: 1px solid #bbb;
    transform: translateY(-6px);
}

.eye-icon {
    color: #bbb;
    cursor: pointer;
    margin-right: 12px;
    transition: color 0.2s;
}

.eye-icon.active {
    color: #333;
}
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
    display: none;
}
input[type="password"]::-webkit-credentials-auto-fill-button {
    display: none;
}

 .icon-question {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background-color: #ddd;
    border: none;
    color: #080808;
    font-size: 14px;
    font-weight: bold;
    margin-right: 12px;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s;
}

.tooltip.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    box-shadow: 0px 8px 12px rgba(0, 0, 0, 0.15);   /* 하단 그림자 */
}
.tooltip-close {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 16px;
    cursor: pointer;
    color: #555;               /* 더 진한 회색 */
}

.tooltip {
    position: absolute;
    top: 68px;
    left: 0;
    right: 0;
    background: white;
    border: 1px solid #000000;
    border-radius: 6px;
    padding-top: 0px;
    padding-bottom:25px;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    line-height: 1.5;
    text-align: left;
    z-index: 100;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.25s, transform 0.25s, box-shadow 0.25s;
    pointer-events: none;
    overflow: visible;
    
}

.icon-question.active {
    background-color: #333;
    color: #fff;
}

.input-wrapper:focus-within {
    border-bottom: 1.5px solid #222 !important;
    
}


.input-wrapper:focus-within .input-icon {
    color: #333;
}
.j{padding-top: 20px; padding-left: 15px;}
.jj{padding-left: 15px;}
.jjj{padding-left: 5px; padding-top: 30px;font-size: 14px;
    font-weight: 500; color: #333;
}
.jjjj{font-size: 14px;
    font-weight: 500; padding-left: 5px; color: #333;}

  .captcha-section {
    display: flex;
    align-items: stretch;    /* 높이 맞추기 */
    gap: 0px;                /* 사진-버튼 간격 제거 */
    padding: 20px 16px;
}

.captcha-image {
    width: 350px;
    height: 80px;
    object-fit: cover;
    border: 1px solid #000000;
    
}

.captcha-buttons {
    display: flex;
    flex-direction: column;
    gap: 0px;
    width: 120px;               /* 남은 공간 채우기 */
}

.captcha-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    background: none;
    border: 1px solid #ddd;
    border-left: none;       /* 사진과 맞닿는 왼쪽 테두리 제거 */
    border-radius: 0px;
    cursor: pointer;
    padding: 5px 10px;
    white-space: nowrap;
    flex: 1;                 /* 버튼 두개가 높이 균등 분할 */
}

.captcha-btn:first-child {
    border-bottom: none;
}

.login-btn {
    width: 100%;
    padding: 13px 130px;
    background: #111;
    color: white;
    font-size: 16px;
    font-weight: 700;
    border: none;
    cursor: pointer;
}

.find-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    font-size: 12px;
    color: #555;
    font-weight: 500;
}

.divider {
    color: #ccc;
}

.social-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
}

.social-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: #eee;
    overflow: hidden;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.social-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.no-focus:focus-within { border-bottom: 1px solid #ccc !important; transform: none !important; }

.s{font-size: 14px; font-weight: 500;display: flex; padding-top: 50px;}

.ss{color: rgb(206, 34, 92);}
.sss{padding-left: 5px;}

.login-btns {
    width: 100%;
    padding: 13px 130px;
    background: #ffffff;
    color: rgb(0, 0, 0);
    font-size: 16px;
    font-weight: 700;
    border: 2px solid black;
    cursor: pointer;
    transition: all 0.1s ease-in-out; /* 👈 이 줄을 추가해 보세요! */
}

.login-btns:hover {
    background: #000000;
    color: #ffffff;
}
    </style>
</head>
<body>
    <div class="a">
        
        <a href="index.html"><img src="mm.PNG" alt="a" class="nn"></a>
        <a href="index.html"><img src="m.PNG" alt="a" class="nnn"></a>
        <div class="n">로그인</div>
    
    </div>

    <div>
        <div class="y">A TWOSOME PLACE</div>
    </div>

    <div class="input-section">
    <!-- 아이디 -->
    <div class="input-wrapper" style="position: relative;">
    <input type="text" placeholder="아이디 입력">
    <span class="icon-question" id="q-btn" onclick="toggleTooltip()">?</span>
   <div class="tooltip" id="tooltip">
    <span class="tooltip-close" id="close-btn" onclick="closeTooltip()"
          style="position:absolute; top:10px; right:12px; font-size:16px; cursor:pointer; color:#555;">✕</span>
    <div class="j">기존 투썸플레이스 홈페이지 또는 앱 회원인 경우 동일 아이디로 로그인
        </div>
        <div class="jj">가능합니다.</div>
</div>
    <span class="tooltip-close" id="close-btn" onclick="closeTooltip()"
          style="display:none; position:absolute; top:44px; right:12px; z-index:101; font-size:16px; cursor:pointer; color:#555;">✕</span>
</div>
</div>


<div class="input-wrapper" id="pw-wrapper">
    <input type="password" placeholder="비밀번호 입력">
    <span class="eye-icon" id="eye-btn" onclick="toggleEye()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
    </span>
</div>
</div>
<div>
    <div class="jjj">정보 보호를 위해 아이디, 비밀번호와 함께 자동 입력 방지 문자를 입력해</div>
    <div class="jjjj">주세요.</div>
</div>


<div class="captcha-section">
    <img src="aaaaaa.PNG" alt="captcha" class="captcha-image">
    <div class="captcha-buttons">
        <button class="captcha-btn" onclick="refreshCaptcha()">새로고침 ↻</button>
        <button class="captcha-btn">음성듣기 🔈</button>
    </div>
</div>

<div class="input-wrapper no-focus" style="margin: -20px 16px 0;">
    <input type="text" placeholder="자동 입력 방지 문자 입력">
</div>

<!-- 로그인 버튼 -->
<div style="padding: 30px 16px 0;">
    <button class="login-btn">로그인</button>
</div>

<!-- 아이디/비밀번호 찾기 -->
<div class="find-section">
    <span>아이디 찾기</span>
    <span class="divider">|</span>
    <span>비밀번호 찾기</span>
</div>

<!-- 카카오/애플 버튼 -->
<div class="social-section">
    <a href="https://accounts.kakao.com" target="_blank">
    <button class="social-btn"><img src="adad.PNG" alt="kakao"></button>
</a>
    <a href="https://appleid.apple.com" target="_blank">
    <button class="social-btn"><img src="adadad.PNG" alt="apple"></button>
</a>
</div>

<div class="s">
    <div class="ss">투썸하트</div>
    <div class="sss">앱이 처음이신가요?</div>
</div>

<div style="padding: 10px 16px 0;">
    <button class="login-btns">회원가입하기</button>
</div>


































<script>
function toggleEye() {
    const wrapper = document.getElementById('pw-wrapper');
    const eye = document.getElementById('eye-btn');
    const input = wrapper.querySelector('input');

    eye.classList.toggle('active');
    wrapper.classList.toggle('eye-active');

    // 비밀번호 표시 토글
    input.type = input.type === 'password' ? 'text' : 'password';
}

function toggleTooltip() {
    const tooltip = document.getElementById('tooltip');
    const btn = document.getElementById('q-btn');
    const close = document.getElementById('close-btn');
    const isShow = tooltip.classList.toggle('show');
    btn.classList.toggle('active');
    close.style.display = isShow ? 'block' : 'none';
}

function closeTooltip() {
    document.getElementById('tooltip').classList.remove('show');
    document.getElementById('q-btn').classList.remove('active');
    document.getElementById('close-btn').style.display = 'none';
}

const captchaImages = ['aaaaaa.PNG', 'u.PNG', 'uu.PNG', 'uuu.PNG', 'uuuu.PNG'];

function refreshCaptcha() {
    const current = document.querySelector('.captcha-image').src;
    let newIndex;
    
    // 현재 이미지랑 다른 이미지가 나오도록
    do {
        newIndex = Math.floor(Math.random() * captchaImages.length);
    } while (document.querySelector('.captcha-image').src.includes(captchaImages[newIndex]));
    
    document.querySelector('.captcha-image').src = captchaImages[newIndex];
}


</script>
</body>
</html>
