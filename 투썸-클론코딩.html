<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .aa{
            display: flex;
            justify-content: space-between;
            background-color: rgb(255, 255, 255);
            padding: 0 16px;
            height: 56px;
            align-items: center;
            position: fixed;
            top:0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            border: 1px solid lightgray;
        }

        .bb{
            background: none;
            font-size: 20px;
            border: none;
            color: white;
            cursor: pointer;
            position: relative;
        }

        .cc{
            font-size: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            right: 40%;
            font-weight: 700;

        }
    
    </style>
</head>
<body>
    <header class="aa">
        <button class="bb">🔲</button>
        <span class="cc">A TWOSOME PLACE</span>
    </header>
    
</body>
</html>
